### SID Experience SFT (train/test split)
###
### Use split training set only:
###   - train: memory_bank_sft_train
###   - test : evaluated by scripts/test_sid_sft.py with memory_bank_test.json

### model
model_name_or_path: /data2/jxk/LlamaFactory/models/Qwen3-8B-SID
trust_remote_code: true
flash_attn: fa2
disable_gradient_checkpointing: false

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: memory_bank_sft_train
cutoff_len: 2048
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/sid_sft/full/Qwen-8B-split
logging_steps: 10
save_steps: 999999
save_total_limit: 1
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
