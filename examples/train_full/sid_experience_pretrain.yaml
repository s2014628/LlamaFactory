### SID Experience Full Pre-training Configuration
###
### Train a model to learn the mapping between SID tokens and experience data.
### Uses full parameter training (not LoRA) to properly learn SID token embeddings.
###
### Prerequisites:
###   1. Expand model vocab with SID tokens using RQ-KMeans/expand_sid_vocab.py
###   2. Convert memory_bank.json to PT format using RQ-KMeans/convert_to_pt.py:
###        python convert_to_pt.py \
###            --input ./memory_bank.json \
###            --output /path/to/LlamaFactory/data/sid_experience_pt.jsonl \
###            --text-field experience_summary \
###            --dedup-by-sid
###   3. Adjust model_name_or_path below to point to the expanded model directory
###
### Usage:
###   # 依赖: pip install -r requirements/deepspeed.txt
###   # 单机多卡（8 卡示例）需用 torchrun 启动 DeepSpeed：
###   FORCE_TORCHRUN=1 CUDA_VISIBLE_DEVICES=0,1,2,3,4,5,6,7 \
###     llamafactory-cli train examples/train_full/sid_experience_pretrain.yaml
###   # 若仍 OOM，可把下方 deepspeed 改为 examples/deepspeed/ds_z3_offload_config.json（会慢一些）

### model
## Point to the expanded model directory (output of expand_sid_vocab.py)
model_name_or_path: /data2/jxk/LlamaFactory/models/Qwen3-4B-SID
trust_remote_code: true
## A800 / 支持 FA2 的 GPU 建议开启，省显存并加速 attention
flash_attn: fa2
## 全参训练务必保持开启（默认即为 false = 启用 checkpoint）
disable_gradient_checkpointing: false

### method
stage: pt
do_train: true
## ZeRO-3：参数分片到多卡，全参训练必备；ZeRO-2 可选 ds_z2_config.json（通信略轻）
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: sid_experience_pt
cutoff_len: 100
preprocessing_num_workers: 16
dataloader_num_workers: 4
finetuning_type: full
### output
output_dir: saves/sid_pretrain/full
logging_steps: 10
save_steps: 100
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-4
num_train_epochs: 10.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval (uncomment to enable validation)
# val_size: 0.1
# per_device_eval_batch_size: 1
# eval_strategy: steps
# eval_steps: 100
