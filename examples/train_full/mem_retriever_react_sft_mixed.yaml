### MemRetriever ReAct SFT (mixed) — GPUs 4,5,6,7
### mem_retriever_react_sft_v2 (85%) + nemotron_general (15%)
### 在 sid_sft 基础上微调，带 tool schema，混通用数据防止 catastrophic forgetting

### model
model_name_or_path: /data2/jxk/LlamaFactory/saves/sid_sft/full/Qwen-8B-20260331
trust_remote_code: true
flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: mem_retriever_react_sft_v2,nemotron_general
mix_strategy: interleave_over
interleave_probs: 0.85,0.15
cutoff_len: 2048
preprocessing_num_workers: 8

### output
output_dir: saves/mem_retriever_react_sft_mixed/full/Qwen-8B
logging_steps: 10
save_steps: 999999
save_total_limit: 1
overwrite_output_dir: true
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 5.0e-6
num_train_epochs: 2
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
